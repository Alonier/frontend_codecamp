<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>홍길동님의 미니홈피 :: 사이좋은 사람들, 싸이월드</title>
    <link href="styles/index.css" rel="stylesheet" />
    <script
      src="https://kit.fontawesome.com/749c71b060.js"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </head>
  <body>
    <div class="background">
      <div class="outerbox">
        <div class="wrapper">
          <div class="wrapper__left">
            <div class="wrapper__left__header">
              <!-- TODAY 0 | TOTAL 12345 -->
              <div class="today">
                <span>TODAY</span>
                <span style="font-size: 11px">0</span>
                <span> | TOTAL</span>
                <span style="font-size: 11px">12345</span>
              </div>
            </div>
            <div class="wrapper__left__body">
              <div class="left__body__header">
                <div class="left__body__header__gray"></div>
                <div class="left__body__header__line"></div>
              </div>
              <div class="left__body__profile">
                <div class="left__body__profile__content">
                  <i class="fa-regular fa-face-smile"></i>
                  이름
                </div>
                <div class="left__body__profile__content">
                  <i class="fa-solid fa-phone"></i>
                  Phone
                </div>
                <div class="left__body__profile__content">
                  <i class="fa-solid fa-envelope"></i>
                  E-mail
                </div>
                <div class="left__body__profile__content">
                  <i class="fa-brands fa-instagram"></i>
                  인스타그램
                </div>
              </div>
              <div class="left__body__footer">
                <div>오늘의 기분</div>
                <select>
                  <option>기쁨 😊</option>
                  <option>슬픔 😭</option>
                  <option>화남 😡</option>
                  <option>지루함 😴</option>
                </select>
              </div>
            </div>
          </div>
          <div class="wrapper__right">
            <div class="wrapper__right__header">
              <div class="right__header__title">사이 좋은 사람들, 싸이월드</div>
              <div class="right__header__setting">사생활보호설정</div>
            </div>
            <div class="wrapper__right__body">
              <iframe src="home.html" id="contentFrame"></iframe>
            </div>
          </div>
          <div class="navigation">
            <div class="navigation__item" id="menuHome" onclick="menuHome()">
              홈
            </div>
            <div
              class="navigation__item"
              id="menuJukebox"
              onclick="menuJukebox()"
            >
              주크박스
            </div>
            <div class="navigation__item" id="menuGame" onclick="menuGame()">
              게임
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
