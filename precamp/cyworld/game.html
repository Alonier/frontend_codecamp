<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>game</title>
    <link href="styles/game.css" rel="stylesheet" />
    <script src="game.js"></script>
  </head>
  <body>
    <div class="wrapper">
      <div class="wrapper__header">
        <div class="header__title">
          <div class="title">GAME</div>
          <div class="subtitle">TODAY CHOICE</div>
        </div>
        <div class="divideLine"></div>
      </div>
      <div class="game__container">
        <img src="./images/word.png" />
        <div class="game__title">끝말잇기</div>
        <div class="game__subtitle">
          제시어 : <span id="word">코드캠프</span>
        </div>
        <div class="word__text">
          <input
            type="text"
            class="textBox"
            id="myWord"
            placeholder="단어를 입력하세요."
          />
          <button class="search" onclick="word_game()">입력</button>
        </div>
        <div class="word__result" id="result">결과!</div>
      </div>
      <div class="game__container">
        <img src="./images/lotto.png" />
        <div class="game__title">LOTTO</div>
        <div class="game__subtitle">버튼을 누르세요.</div>
        <div class="game__lotto">
          <span id="lotto_1">3</span><span id="lotto_2">5</span
          ><span id="lotto_3">10</span><span id="lotto_4">24</span
          ><span id="lotto_5">30</span><span id="lotto_6">34</span>
        </div>
        <button class="game__lotto_button">추첨</button>
      </div>
    </div>
  </body>
</html>
